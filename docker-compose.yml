version: '3.8'
services:
  postgres:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: chatuser
      POSTGRES_PASSWORD: chatpass
      POSTGRES_DB: chatdb
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    restart: always
    ports:
      - '6379:6379'

  backend:
    build: ./backend
    command: deno run --allow-all main.ts
    volumes:
      - ./backend:/app
    working_dir: /app
    environment:
      - DATABASE_URL=postgres://chatuser:chatpass@postgres:5432/chatdb
      - REDIS_URL=redis://redis:6379
    ports:
      - '8000:8000'
    depends_on:
      - postgres
      - redis

  frontend:
    build: ./frontend
    command: npm run dev
    volumes:
      - ./frontend:/app
    working_dir: /app
    ports:
      - '5173:5173'
    depends_on:
      - backend

volumes:
  pgdata:
